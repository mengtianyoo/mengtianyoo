<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Mengtian Yoo | Academic Homepage</title>
		<meta
			name="description"
			content="A bilingual academic homepage for profile, research introduction, publications, projects, experience, and contact information."
		/>
		<link rel="stylesheet" href="assets/css/fontawesome-all.min.css" />
		<link rel="stylesheet" href="assets/css/academic.css" />
	</head>
	<body data-page="publications">
		<a class="skip-link" href="#content-panel">Skip to content</a>
		<header class="topbar">
			<a class="brand" href="index.html" aria-label="Homepage">
				<span class="brand-mark" id="site-brand-mark">MY</span>
				<span class="brand-text" id="site-brand-text">Academic Profile</span>
			</a>
			<nav class="site-nav" aria-label="Primary navigation">
				<div class="nav-links" id="nav-links"></div>
			</nav>
			<div class="lang-switch" role="group" aria-label="Language switch">
				<button class="lang-button" data-lang="zh" type="button">中文</button>
				<button class="lang-button" data-lang="en" type="button">EN</button>
			</div>
		</header>

		<div class="page-shell">
			<aside class="profile-panel" id="profile-panel"></aside>
			<main class="content-panel" id="content-panel" tabindex="-1">
				<noscript>
					<div class="noscript-note">
						This homepage uses a small script to render bilingual content. Please
						enable JavaScript to view the full page.
					</div>
				</noscript>
			</main>
		</div>

		<footer class="site-footer" id="site-footer"></footer>

		<script src="assets/js/site-content.js"></script>
		<script src="assets/js/site.js"></script>
	</body>
</html>
